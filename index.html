<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Internet Explorer - Meow Edition</title>
    <style>
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            /* Легендарные холмы Windows XP */
            background: url('https://images.wallpapersden.com/image/download/windows-xp-bliss-original_bGlpZ2mUmZqaraWkpJRmbmdlrWlnZ2U.jpg') no-repeat center center fixed;
            background-size: cover;
            font-family: "Tahoma", sans-serif;
            overflow: hidden;
        }

        /* Окно в стиле Windows XP */
        .window {
            width: 350px;
            background: #ece9d8;
            border: 3px solid #0054e3;
            border-top-left-radius: 8px;
            border-top-right-radius: 8px;
            box-shadow: 5px 5px 15px rgba(0,0,0,0.3);
            z-index: 100;
        }

        .title-bar {
            background: linear-gradient(180deg, #0997ff 0%, #0054e3 8%, #0054e3 92%, #0054e3 100%);
            padding: 3px 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: white;
            font-weight: bold;
            font-size: 13px;
        }

        .window-content {
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
        }

        .message {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 13px;
        }

        /* Глянцевая кнопка OK */
        .ok-btn {
            padding: 5px 25px;
            background: linear-gradient(180deg, #ffffff 0%, #dcdcdc 100%);
            border: 1px solid #707070;
            box-shadow: inset 0 0 5px white;
            cursor: pointer;
            outline: none;
        }

        .ok-btn:active {
            background: #c1c1c1;
        }

        /* Nyan Cat */
        #nyan {
            position: fixed;
            top: 40%;
            left: -300px;
            width: 250px;
            z-index: 50;
            pointer-events: none;
        }

        @keyframes fly {
            from { left: -300px; }
            to { left: 110%; }
        }

        /* Пузыри (Frutiger Aero) */
        .bubble {
            position: absolute;
            background: rgba(255, 255, 255, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.5);
            border-radius: 50%;
            backdrop-filter: blur(5px);
            box-shadow: inset -5px -5px 15px rgba(255,255,255,0.4);
            pointer-events: none;
        }
    </style>
</head>
