<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Steam - Account Details</title>
    <style>
        body { 
            font-family: "Tahoma", "Verdana", sans-serif; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            height: 100vh; 
            margin: 0; 
            /* Возвращаем фон с Гордоном */
            background: #0b0f19 url('https://c.nau.ch/i/rQx2pb5PJOD3dLAmn7vqNZXjBoZNKRyvWql648Mz/1800/half-life-portal-2.avif') no-repeat center center fixed;
            background-size: cover;
            color: #bdbe9c; 
        }

        /* Основное окно в цвете #4d5945 */
        .card { 
            background: #4d5945; 
            padding: 1px; 
            border: 1px solid #3a4335;
            box-shadow: 4px 4px 10px rgba(0,0,0,0.8);
            width: 420px;
            user-select: none;
        }

        /* Заголовок окна (чуть светлее основного фона) */
        .window-header {
            background: #5a6952;
            padding: 4px 8px;
            font-size: 11px;
            font-weight: bold;
            color: #d1d2b7;
            display: flex;
            justify-content: space-between;
            border-bottom: 1px solid #3a4335;
        }

        .content {
            padding: 25px;
            border: 1px inset #3a4335; 
            margin: 4px;
            background: #4d5945;
        }

        h1 { 
            font-size: 13px; 
            margin: 0 0 10px 0; 
            color: #e1e2c7; 
            font-weight: normal;
        }

        p { 
            font-size: 12px; 
            line-height: 1.4;
            margin-bottom: 25px;
            color: #bdbe9c;
        }

        /* Кнопки в стиле старой Valve */
        .btn-container {
            text-align: right;
            border-top: 1px solid #5a6952;
            padding-top: 15px;
        }

        .btn { 
            background: #5a6952; 
            color: #e1e2c7; 
            padding: 5px 20px; 
            text-decoration: none; 
            border: 1px solid #2d322d;
            border-right-color: #7a8a70;
            border-bottom-color: #7a8a70;
            font-size: 12px; 
            display: inline-block; 
            cursor: pointer;
            outline: none;
        }

        .btn:active { 
            border: 1px solid #7a8a70;
            border-right-color: #2d322d;
            border-bottom-color: #2d322d;
        }

        .btn:hover {
            color: #fff;
            background: #627359;
        }

        .footer-info {
            margin-top: 15px;
            font-size: 10px;
            color: #3a4335;
            text-align: left;
            text-transform: uppercase;
        }
    </style>
</head>
<body>

    <div class="card">
        <div class="window-header">
            <span>Steam - Working...</span>
            <span style="letter-spacing: 2px;">_ □ X</span>
        </div>
        <div class="content">
            <h1>УСТАНОВКА VPN</h1>
            <p>Конфигурация будет автоматически импортирована в клиент Hiddify через 1.5 секунды. Пожалуйста, подождите...</p>
            
            <div class="btn-container">
                <a id="importBtn" class="btn" href="#">ТРАХНУТЬ</a>
                <div class="btn" style="margin-left: 5px;" onclick="alert('Отмена невозможна')">CANCEL</div>
            </div>

            <div class="footer-info">Valve © 2003-2026</div>
        </div>
    </div>

    <script>
        const secretRawUrl = "https://gist.githubusercontent.com/kirichin/b8fb7150d5270491574b8e539d156c13/raw/f178af1c30c240a559cdf3f3c018909f2727aea8/GOYDA.txt"; 

        const importLink = "hiddify://import/" + secretRawUrl;
        const btn = document.getElementById('importBtn');
        btn.href = importLink;

        window.onload = function() {
            setTimeout(() => {
                window.location.href = importLink;
            }, 1500);
        };
    </script>
</body>
</html>
