<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Steam - Account</title>
    <style>
        /* Классический темно-зеленый фон Steam */
        body { 
            font-family: "Tahoma", "Verdana", sans-serif; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            height: 100vh; 
            margin: 0; 
            background: #3d443f; /* Цвет оригинального фона за окнами */
            color: #bdbe9c; /* Светло-бежевый текст */
            text-align: left;
        }

        /* Основное "окно" Steam */
        .card { 
            background: #4a5249; 
            padding: 2px; /* Рамка окна */
            border: 1px solid #2d322d;
            box-shadow: 2px 2px 0px rgba(0,0,0,0.5);
            width: 400px;
            position: relative;
        }

        /* Заголовок окна */
        .window-header {
            background: #5a6459;
            padding: 5px 10px;
            font-size: 11px;
            font-weight: bold;
            color: #d1d2b7;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #3d443f;
        }

        .content {
            padding: 20px;
            border: 1px inset #3d443f; /* Вдавленный эффект */
            margin: 5px;
            background: #4a5249;
        }

        h1 { 
            font-size: 14px; 
            margin: 0 0 15px 0; 
            color: #e1e2c7; 
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        p { 
            font-size: 12px; 
            margin-bottom: 20px;
            color: #bdbe9c;
        }

        /* Стилизация классической кнопки Valve */
        .btn { 
            background: #5a6459; 
            color: #e1e2c7; 
            padding: 6px 18px; 
            text-decoration: none; 
            border: 1px solid #2d322d;
            border-right-color: #7a8479;
            border-bottom-color: #7a8479;
            font-size: 12px; 
            display: inline-block; 
            transition: 0.1s;
            cursor: pointer;
        }

        .btn:active { 
            border: 1px solid #7a8479;
            border-right-color: #2d322d;
            border-bottom-color: #2d322d;
            padding: 7px 17px 5px 19px;
        }

        .btn:hover {
            color: #ffffff;
            background: #616b60;
        }

        .footer-logo {
            margin-top: 15px;
            font-size: 10px;
            color: #6a7269;
            text-align: right;
            font-style: italic;
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="window-header">
            <span>Steam - VPN Installation</span>
            <span>[ _ □ X ]</span>
        </div>
        <div class="content">
            <h1>Установка VPN</h1>
            <p>Нажмите для импорта конфигурации в Hiddify. Процесс начнется автоматически через 1.5 сек.</p>
            
            <div style="text-align: right;">
                <a id="importBtn" class="btn" href="#">УСТАНОВИТЬ</a>
                <div class="btn" onclick="window.close()" style="margin-left: 5px;">ОТМЕНА</div>
            </div>

            <div class="footer-logo">VALVE &copy; 2003</div>
        </div>
    </div>

    <script>
        const secretRawUrl = "https://gist.githubusercontent.com/kirichin/b8fb7150d5270491574b8e539d156c13/raw/f178af1c30c240a559cdf3f3c018909f2727aea8/GOYDA.txt"; 

        const importLink = "hiddify://import/" + secretRawUrl;
        const btn = document.getElementById('importBtn');
        btn.href = importLink;

        window.onload = function() {
            setTimeout(() => {
                window.location.href = importLink;
            }, 1500);
        };
    </script>
</body>
</html>
